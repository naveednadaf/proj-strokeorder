<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chinese Character Stroke Animator</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      padding: 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 20px;
    }

    .input-section {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
    }

    .speed-control {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #555;
      font-size: 14px;
    }

    #speedSlider {
      width: 120px;
      cursor: pointer;
    }

    #charInput {
      padding: 12px 16px;
      font-size: 18px;
      border: 2px solid #ddd;
      border-radius: 8px;
      width: 300px;
      outline: none;
      transition: border-color 0.3s;
    }

    #charInput:focus {
      border-color: #4a90d9;
    }

    #generateBtn {
      padding: 12px 24px;
      font-size: 16px;
      background: #4a90d9;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.3s;
    }

    #generateBtn:hover {
      background: #357abd;
    }

    .chars-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
    }

    .char-card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .char-card .character {
      font-size: 32px;
      color: #333;
      margin-bottom: 8px;
    }

    .char-card .pinyin {
      font-size: 14px;
      color: #4a90d9;
      font-weight: 600;
      margin-bottom: 4px;
      min-height: 18px;
    }

    .char-card .meaning {
      font-size: 13px;
      color: #666;
      text-align: center;
      margin-bottom: 10px;
      min-height: 32px;
      line-height: 1.4;
    }

    .char-card .writer-container {
      width: 200px;
      height: 200px;
    }

    .char-card .controls {
      margin-top: 15px;
      display: flex;
      gap: 8px;
    }

    .char-card .dictionary-info {
      margin-top: 10px;
      padding: 10px;
      background: #f8f9fa;
      border-radius: 6px;
      width: 100%;
      display: none;
    }

    .char-card .dictionary-info.show {
      display: block;
    }

    .char-card .dictionary-info .dict-pinyin {
      font-size: 14px;
      color: #4a90d9;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .char-card .dictionary-info .dict-meaning {
      font-size: 13px;
      color: #555;
      line-height: 1.5;
    }

    .char-card button {
      padding: 8px 16px;
      font-size: 14px;
      background: #4a90d9;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .char-card button:hover {
      background: #357abd;
    }

    .char-card button.secondary {
      background: #6c757d;
    }

    .char-card button.secondary:hover {
      background: #5a6268;
    }

    .empty-state {
      text-align: center;
      color: #999;
      padding: 60px 20px;
    }

    .empty-state p {
      font-size: 18px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Chinese Character Stroke Animator</h1>

    <div class="input-section">
      <input
        type="text"
        id="charInput"
        placeholder="Enter Chinese characters (e.g., ńŻáňąŻńŞľšĽî)"
        autocomplete="off"
      >
      <button id="generateBtn">Generate</button>
      <div class="speed-control">
        <label for="speedSlider">Speed:</label>
        <input type="range" id="speedSlider" min="0.5" max="3" step="0.5" value="1">
        <span id="speedValue">1x</span>
      </div>
    </div>

    <div id="charsGrid" class="chars-grid">
      <div class="empty-state">
        <p>Enter Chinese characters above to see stroke animations</p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
  <script>
    const charInput = document.getElementById('charInput');
    const generateBtn = document.getElementById('generateBtn');
    const charsGrid = document.getElementById('charsGrid');
    const speedSlider = document.getElementById('speedSlider');
    const speedValue = document.getElementById('speedValue');

    let currentSpeed = 1;
    let writers = [];
    let cedictData = {};

    // Convert pinyin with tone numbers to proper tone marks
    function convertPinyin(pinyin) {
      const toneMarks = {
        'a': ['─ü', '├í', 'ăÄ', '├á'],
        'e': ['─ô', '├ę', '─Ť', '├Ę'],
        'i': ['─ź', '├ş', 'ăÉ', '├Č'],
        'o': ['┼Ź', '├│', 'ăĺ', '├▓'],
        'u': ['┼ź', '├║', 'ăö', '├╣'],
        '├╝': ['ăľ', 'ăś', 'ăÜ', 'ăť'],
        'v': ['ăľ', 'ăś', 'ăÜ', 'ăť']
      };

      return pinyin.replace(/([aeiouv])([1-4])/gi, (match, vowel, tone) => {
        const vowelLower = vowel.toLowerCase();
        const toneIndex = parseInt(tone) - 1;
        if (toneMarks[vowelLower] && toneMarks[vowelLower][toneIndex]) {
          return toneMarks[vowelLower][toneIndex];
        }
        return match;
      }).replace(/([aeiouv])5/gi, '$1');
    }

    // Parse CC-CEDICT dictionary
    async function loadCedict() {
      try {
        const response = await fetch('cedict_ts.u8');
        const text = await response.text();
        const lines = text.split(/\r?\n/);
        let entryCount = 0;

        for (const line of lines) {
          if (line.startsWith('#') || line.trim() === '' || line.startsWith('%')) continue;

          const match = line.match(/^(\S+)\s+(\S+)\s+\[([^\]]+)\]\s+\/(.+)$/);
          if (match) {
            const [, traditional, simplified, pinyin, definitions] = match;
            const defs = definitions.split('/').filter(d => d.trim());

            if (traditional.length === 1) {
              if (!cedictData[traditional]) {
                cedictData[traditional] = { pinyin, definitions: [] };
                entryCount++;
              }
              cedictData[traditional].definitions = [...cedictData[traditional].definitions, ...defs];
            }
            if (simplified && simplified !== traditional && simplified.length === 1) {
              if (!cedictData[simplified]) {
                cedictData[simplified] = { pinyin, definitions: [] };
                entryCount++;
              }
              cedictData[simplified].definitions = [...cedictData[simplified].definitions, ...defs];
            }
          }
        }
        console.log('CC-CEDICT loaded with', entryCount, 'single-character entries');
      } catch (error) {
        console.error('Error loading CC-CEDICT:', error);
      }
    }

    function lookupChar(character) {
      return cedictData[character] || null;
    }

    speedSlider.addEventListener('input', (e) => {
      currentSpeed = parseFloat(e.target.value);
      speedValue.textContent = currentSpeed + 'x';
      restartAllAnimations();
    });

    function startLoop(writer, speed) {
      writer.loopCharacterAnimation({
        strokeAnimationSpeed: speed,
        delayBetweenLoops: 0,
      });
    }

    function restartAllAnimations() {
      writers.forEach(({ writer, character, container }) => {
        container.innerHTML = '';
        const newWriter = HanziWriter.create(container, character, {
          width: 200,
          height: 200,
          padding: 5,
          showOutline: true,
          strokeAnimationSpeed: currentSpeed,
          delayBetweenStrokes: 200,
        });
        startLoop(newWriter, currentSpeed);

        const idx = writers.findIndex(w => w.container === container);
        if (idx !== -1) {
          writers[idx] = { writer: newWriter, character, container };
        }
      });
    }

    function createCharCard(character, index) {
      const card = document.createElement('div');
      card.className = 'char-card';

      const charDisplay = document.createElement('div');
      charDisplay.className = 'character';
      charDisplay.textContent = character;

      const pinyinEl = document.createElement('div');
      pinyinEl.className = 'pinyin';
      pinyinEl.textContent = '';

      const meaningEl = document.createElement('div');
      meaningEl.className = 'meaning';
      meaningEl.textContent = '';

      const writerContainer = document.createElement('div');
      writerContainer.className = 'writer-container';
      writerContainer.id = `char-${index}`;

      const controls = document.createElement('div');
      controls.className = 'controls';

      const dictBtn = document.createElement('button');
      dictBtn.textContent = 'Eng + Pinyin';
      dictBtn.onclick = () => {
        const dictInfo = card.querySelector('.dictionary-info');
        if (dictInfo) {
          dictInfo.classList.toggle('show');
        }
      };

      const resetBtn = document.createElement('button');
      resetBtn.textContent = 'Reset';
      resetBtn.className = 'secondary';
      resetBtn.onclick = () => {
        writerContainer.innerHTML = '';
        const newWriter = HanziWriter.create(writerContainer, character, {
          width: 200,
          height: 200,
          padding: 5,
          showOutline: true,
          strokeAnimationSpeed: currentSpeed,
          delayBetweenStrokes: 200,
        });
        startLoop(newWriter, currentSpeed);

        const idx = writers.findIndex(w => w.container === writerContainer);
        if (idx !== -1) {
          writers[idx] = { writer: newWriter, character, container: writerContainer };
        }
      };

      controls.appendChild(dictBtn);
      controls.appendChild(resetBtn);

      const dictionaryInfo = document.createElement('div');
      dictionaryInfo.className = 'dictionary-info';
      const dictPinyin = document.createElement('div');
      dictPinyin.className = 'dict-pinyin';
      const dictMeaning = document.createElement('div');
      dictMeaning.className = 'dict-meaning';
      dictionaryInfo.appendChild(dictPinyin);
      dictionaryInfo.appendChild(dictMeaning);

      card.appendChild(charDisplay);
      card.appendChild(writerContainer);
      card.appendChild(controls);
      card.appendChild(dictionaryInfo);

      charsGrid.appendChild(card);

      // Lookup character in CC-CEDICT
      const dictData = lookupChar(character);
      if (dictData) {
        const pinyinText = convertPinyin(dictData.pinyin);
        pinyinEl.textContent = pinyinText;
        meaningEl.textContent = dictData.definitions[0] || '';
        dictPinyin.textContent = pinyinText;
        dictMeaning.textContent = dictData.definitions.slice(0, 3).join('; ');
      } else if (Object.keys(cedictData).length === 0) {
        pinyinEl.textContent = 'Loading...';
        dictPinyin.textContent = 'Dictionary loading...';
        dictMeaning.textContent = '';
      } else {
        pinyinEl.textContent = '';
        dictPinyin.textContent = 'No dictionary data';
        dictMeaning.textContent = '';
      }

      const writer = HanziWriter.create(writerContainer, character, {
        width: 200,
        height: 200,
        padding: 5,
        showOutline: true,
        strokeAnimationSpeed: currentSpeed,
        delayBetweenStrokes: 200,
      });
      startLoop(writer, currentSpeed);

      writers.push({ writer, character, container: writerContainer });

      return card;
    }

    function generateCards() {
      const input = charInput.value.trim();

      if (!input) {
        charsGrid.innerHTML = `
          <div class="empty-state">
            <p>Enter Chinese characters above to see stroke animations</p>
          </div>
        `;
        writers = [];
        return;
      }

      const chineseChars = input.split('').filter(char => /[\u4e00-\u9fff]/.test(char));

      if (chineseChars.length === 0) {
        charsGrid.innerHTML = `
          <div class="empty-state">
            <p>No Chinese characters found. Please enter valid Chinese characters.</p>
          </div>
        `;
        writers = [];
        return;
      }

      charsGrid.innerHTML = '';
      writers = [];

      chineseChars.forEach((char, index) => {
        const card = createCharCard(char, index);
        charsGrid.appendChild(card);
      });
    }

    generateBtn.addEventListener('click', generateCards);

    charInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        generateCards();
      }
    });

    // Load CC-CEDICT dictionary on page load
    loadCedict();
  </script>
</body>
</html>
